<!DOCTYPE html>

<html>

<head>

    <title>Signup</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center align-items-center"
         style="height:100vh;">

        <div class="col-md-4">

            <div class="card shadow p-4 border-0">

                <h2 class="text-center mb-4">

                    Mall Signup

                </h2>

                <!-- SIGNUP FORM -->

                <form method="POST">

                    {% csrf_token %}

                    <!-- USERNAME -->

                    <div class="mb-3">

                        <label class="form-label">

                            Full Name / Username

                        </label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               placeholder="Enter Your Name"
                               required>

                    </div>

                    <!-- PASSWORD -->

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter Password"
                               required>

                    </div>

                    <!-- ROLE -->

                    <div class="mb-3">

                        <label class="form-label">

                            Select Role

                        </label>

                        <select name="role"
                                class="form-control">

                            <option value="owner">

                                Owner

                            </option>

                            <option value="cashier">

                                Cashier

                            </option>

                        </select>

                    </div>

                    <!-- BUTTON -->

                    <button class="btn btn-success w-100">

                        Create Account

                    </button>

                </form>

                <!-- ERROR -->

                {% if error %}

                <div class="alert alert-danger mt-3">

                    {{ error }}

                </div>

                {% endif %}

                <!-- LOGIN LINK -->

                <div class="text-center mt-3">

                    <a href="/login/">

                        Already have account?

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
